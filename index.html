<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaSaaS LLC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      gap: 2rem;
    }
    .logo {
      max-width: 360px;
      width: 90%;
    }
    .tagline {
      font-size: 1.4rem;
      letter-spacing: 0.1em;
      color: #aaa;
      text-transform: lowercase;
    }
    .qr-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .qr-wrapper img {
      width: 160px;
      height: 160px;
      border-radius: 8px;
    }
    .qr-label {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <img class="logo" src="copy-logo.png" alt="SaaSaaS LLC">
  <p class="tagline">more details soon.</p>
  <div class="qr-wrapper">
    <img src="c474f280492db27fc806ad6b9cc0b7fe2a7e70defa585a7085902901abb0a249.png" alt="Signal QR code">
    <span class="qr-label">message via signal</span>
  </div>
</body>
</html>
